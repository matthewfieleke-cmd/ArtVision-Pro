name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'cursor/**'

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Architecture tests
        run: npm run test:architecture

      - name: Build
        run: npm run build:ci

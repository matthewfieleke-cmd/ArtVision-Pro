# Build with the correct subpath for GitHub project Pages and deploy to GitHub Pages.
# Settings → Pages → Source: GitHub Actions.
# Optional repository secret VITE_CRITIQUE_API_URL: origin of your deployed API (e.g. https://xxx.vercel.app).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Build
        env:
          # Required for https://<user>.github.io/<repo>/ so assets, SW, and manifest resolve correctly.
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_CRITIQUE_API_URL: ${{ secrets.VITE_CRITIQUE_API_URL }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

# Build with the correct subpath for GitHub project Pages and deploy to GitHub Pages.
#
# Required once: Settings → Pages → Build and deployment → Source → GitHub Actions (not "Deploy from a branch").
# First deploy: if the deploy job waits for approval, open the run → Review deployments → approve github-pages.
#
# Optional repository secret VITE_CRITIQUE_API_URL: origin of your deployed API (e.g. https://xxx.vercel.app).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Build
        env:
          # Required for https://<user>.github.io/<repo>/ so assets, SW, and manifest resolve correctly.
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_CRITIQUE_API_URL: ${{ secrets.VITE_CRITIQUE_API_URL }}
        run: npm run build
      - name: Expected site URL (project Pages)
        run: |
          echo "After deploy succeeds, open (replace OWNER with your GitHub username or org):"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
